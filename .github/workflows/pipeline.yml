name: MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v3
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r enginedata-MLOps/deploy/requirements.txt
        pip install --force-reinstall "numpy==1.26.4" "scikit-learn==1.2.2"
        # Added nest-asyncio to prevent the notebook engine loop crash
        pip install papermill datasets nest-asyncio nbformat nbconvert

    - name: Execute MLOps Notebook
      run: |
        # Inject nest_asyncio directly into the execution run using a clean Python wrapper script
        python -c "
        import nest_asyncio
        nest_asyncio.apply()
        import papermill as pm
        pm.execute_notebook('PredictiveMaintenance.ipynb', 'output_notebook.ipynb', kernel_name='python3')
        "
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_USERNAME: "${{ secrets.HF_USERNAME }}"