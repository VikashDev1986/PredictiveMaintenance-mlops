name: MLOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_USERNAME: ${{ secrets.HF_USERNAME }}
      GH_PAT: ${{ secrets.GH_PAT }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}
        fetch-depth: 0

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn xgboost \
                    huggingface_hub datasets \
                    flask joblib requests matplotlib seaborn \
                    papermill nest-asyncio nbformat nbconvert ipykernel

    - name: Register Jupyter kernel
      run: |
        python -m ipykernel install --user --name python3 --display-name "Python 3"

    - name: Execute MLOps Notebook
      run: |
        python - <<'PYEOF'
        import nest_asyncio
        nest_asyncio.apply()
        import papermill as pm
        pm.execute_notebook(
            'PredictiveMaintenance.ipynb',
            'output_notebook.ipynb',
            kernel_name='python3'
        )
        PYEOF

    - name: Push artefacts back to main
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add enginedata-MLOps/ || true
        if git diff --cached --quiet; then
          echo "No changes to commit."
        else
          git commit -m "ci: update MLOps artefacts [skip ci]"
          git push origin main
        fi