name: MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v3
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install all dependencies including the strictly pinned numpy from requirements.txt
        pip install -r enginedata-MLOps/deploy/requirements.txt
        # Re-install numpy and scikit-learn to ensure binary compatibility,
        # which often fixes 'numpy.dtype size changed' errors if another package indirectly caused an issue.
        pip install --force-reinstall "numpy==1.26.4" "scikit-learn==1.2.2"
        # Install additional packages required for the GitHub Actions workflow execution
        pip install papermill datasets

    - name: Execute MLOps Notebook
      run: |
        papermill PredictiveMaintenance.ipynb output_notebook.ipynb          -k python3
      env:
        # Pass Hugging Face token as an environment variable
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_USERNAME: "${{ secrets.HF_USERNAME }}" # Assuming you'd set this too if needed

    # Optional: If your notebook modifies files in the repo (e.g., generates new data files or plots to commit)
    # - name: Commit and Push changes (if any)
    #   run: |
    #     git config user.name github-actions[bot]
    #     git config user.email github-actions[bot]@users.noreply.github.com
